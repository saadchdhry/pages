<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>&#8212;</title>
  <style>
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      color-scheme: light dark;
    }

    body {
      height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display",
                   "Helvetica Neue", "Segoe UI", sans-serif;
      user-select: none;
      -webkit-font-smoothing: antialiased;
      transition: background 0.3s, color 0.3s;
    }

    /* ── Dark ── */
    @media (prefers-color-scheme: dark) {
      body   { background: #0c0c0c; }
      .time  { color: #f0f0f0; }
      .ampm  { color: #555; }
      .date  { color: #3a3a3a; }
    }

    /* ── Light ── */
    @media (prefers-color-scheme: light) {
      body   { background: #f5f5f3; }
      .time  { color: #111111; }
      .ampm  { color: #bbb; }
      .date  { color: #c0c0c0; }
    }

    .clock-wrap {
      display: flex;
      align-items: baseline;
      gap: 0.15em;
    }

    .time {
      font-size: clamp(72px, 14vw, 140px);
      font-weight: 100;
      letter-spacing: -0.03em;
      line-height: 1;
      font-variant-numeric: tabular-nums;
    }

    .ampm {
      font-size: clamp(16px, 2.5vw, 28px);
      font-weight: 300;
      letter-spacing: 0.05em;
      margin-bottom: 0.15em;
    }

    .date {
      margin-top: clamp(10px, 1.5vw, 20px);
      font-size: clamp(11px, 1.4vw, 15px);
      font-weight: 400;
      letter-spacing: 0.25em;
      text-transform: uppercase;
    }
  </style>
</head>
<body>

  <div class="clock-wrap">
    <span class="time" id="clock">12:00</span>
    <span class="ampm" id="ampm">AM</span>
  </div>
  <div class="date" id="date">Monday, Apr 20</div>

  <script>
    const DAYS   = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
    const MONTHS = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

    function tick() {
      const now  = new Date();
      let   h    = now.getHours();
      const m    = String(now.getMinutes()).padStart(2, '0');
      const ampm = h >= 12 ? 'PM' : 'AM';
      h = h % 12 || 12;

      document.getElementById('clock').textContent = `${h}:${m}`;
      document.getElementById('ampm').textContent  = ampm;
      document.getElementById('date').textContent  =
        `${DAYS[now.getDay()]}, ${MONTHS[now.getMonth()]} ${now.getDate()}`;
    }

    tick();
    // Sync to the top of each minute for a snappy feel
    const msUntilNextMinute = (60 - new Date().getSeconds()) * 1000 - new Date().getMilliseconds();
    setTimeout(() => { tick(); setInterval(tick, 60_000); }, msUntilNextMinute);
    // Also tick every second for the first minute so AM/PM flips correctly
    const secondTick = setInterval(() => { tick(); }, 1000);
    setTimeout(() => clearInterval(secondTick), msUntilNextMinute + 100);
  </script>

</body>
</html>
