<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>&#8212;</title>
  <link rel="icon" type="image/png" href="favicon.png">
  <style>
    *,
    *::before,
    *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      color-scheme: light dark;
    }

    body {
      height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      user-select: none;
    }

    @media (prefers-color-scheme: dark) {
      body {
        background: #0c0c0c;
      }

      .bg {
        fill: #0c0c0c;
      }
    }

    @media (prefers-color-scheme: light) {
      body {
        background: #f5f5f3;
      }

      .bg {
        fill: #f5f5f3;
      }
    }

    #clock {
      width: min(70vw, 70vh);
      height: min(70vw, 70vh);
      display: block;
      border-radius: 50%;
    }

    .tick,
    .hand,
    .pip {
      mix-blend-mode: difference;
      fill: white;
      stroke: white;
    }

    .hand,
    .pip {
      stroke: none;
    }

    /* Hint the browser to promote each hand to its own compositor layer. */
    #hHand,
    #mHand,
    #sHand {
      will-change: transform;
    }

    /* ── FPS toggle ── */
    #fpsToggle {
      position: fixed;
      bottom: 72px;
      right: 24px;
      width: 36px;
      height: 36px;
      opacity: 0.18;
      transition: opacity 0.2s ease;
      background: none;
      border: none;
      padding: 0;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    #fpsToggle:hover   { opacity: 0.55; }
    #fpsToggle.ticking { opacity: 0.40; }

    /* ── Minute tick toggle ── */
    #minToggle {
      position: fixed;
      bottom: 24px;
      right: 24px;
      width: 36px;
      height: 36px;
      opacity: 0.18;
      transition: opacity 0.2s ease;
      background: none;
      border: none;
      padding: 0;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    #minToggle:hover  { opacity: 0.55; }
    #minToggle.active { opacity: 0.40; }

    /* ── Stem slider ── */
    #stemSlider {
      position: fixed;
      bottom: 32px;
      left: 24px;
      width: 80px;
      opacity: 0.18;
      transition: opacity 0.2s ease;
      cursor: pointer;
    }
    #stemSlider:hover { opacity: 0.55; }
    @media (prefers-color-scheme: dark)  { #stemSlider { accent-color: #f0f0f0; } }
    @media (prefers-color-scheme: light) { #stemSlider { accent-color: #111111; } }

  </style>
</head>

<body>

  <svg id="clock" viewBox="-1 -1 2 2">

    <rect x="-1" y="-1" width="2" height="2" class="bg" />

    <circle cx="0" cy="0" r="0.35" class="pip" />

    <g id="ticks"></g>

    <g id="minTicks" style="display:none"></g>

    <g id="hHand"></g>
    <g id="mHand"></g>
    <g id="sHand"></g>

  </svg>

  <input type="range" id="stemSlider" min="2" max="20" value="5" step="1" aria-label="Stroke weight">

  <button id="fpsToggle" aria-label="Toggle continuous / ticking mode"></button>

  <button id="minToggle" aria-label="Toggle minute markers">
    <svg width="20" height="20" viewBox="-1 -1 2 2" fill="none">
      <line x1="0"     y1="-0.62" x2="0"     y2="-0.90" stroke="currentColor" stroke-width="0.14" stroke-linecap="round"/>
      <line x1="0.62"  y1="0"     x2="0.90"  y2="0"     stroke="currentColor" stroke-width="0.14" stroke-linecap="round"/>
      <line x1="0"     y1="0.62"  x2="0"     y2="0.90"  stroke="currentColor" stroke-width="0.14" stroke-linecap="round"/>
      <line x1="-0.62" y1="0"     x2="-0.90" y2="0"     stroke="currentColor" stroke-width="0.14" stroke-linecap="round"/>
    </svg>
  </button>

  <script>
    // ─── Design constants ──────────────────────────────────────────
    const PHI  = (1 + Math.sqrt(5)) / 2;
    let   stem = 0.005;
    let   sW, mW, hW;

    function updateWidths() {
      sW = stem;
      mW = stem * PHI * PHI;
      hW = stem * PHI * PHI * PHI * PHI;
    }

    // ─── Tick marks ────────────────────────────────────────────────
    const ticksEl    = document.getElementById('ticks');
    const minTicksEl = document.getElementById('minTicks');

    function buildTicks() {
      ticksEl.innerHTML    = '';
      minTicksEl.innerHTML = '';

      const tickOuter  = 0.940;
      const majorInner = 0.860;
      const majorLen   = tickOuter - majorInner;
      const minorInner = tickOuter - majorLen / (PHI * PHI);
      const minorLen   = tickOuter - minorInner;
      const monthInner = tickOuter - (majorLen * PHI);
      const dateInner  = tickOuter - (minorLen * PHI);

      // ── Calendar state ────────────────────────────────────────────
      const now      = new Date();
      const curMonth = now.getMonth();  // 0–11; 0=Jan
      const curDay   = now.getDay();    // 0=Sun…6=Sat
      const curDate  = now.getDate();   // 1–31

      // Jan(0)→i=5, Feb(1)→i=10, …, Dec(11)→i=0
      const monthTickIdx = ((curMonth + 1) % 12) * 5;
      const dateTickIdx  = curDate;

      // Mon→45, Tue→50, Wed→55, Thu→0, Fri→5, Sat→10, Sun→15
      const DAY_TO_IDX = [15, 45, 50, 55, 0, 5, 10];
      const dayTickIdx = DAY_TO_IDX[curDay];

      const phi3 = PHI * PHI * PHI;

      function appendTick(target, angle, inner, outer, width) {
        const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
        line.setAttribute('x1', ( Math.sin(angle) * inner).toFixed(5));
        line.setAttribute('y1', (-Math.cos(angle) * inner).toFixed(5));
        line.setAttribute('x2', ( Math.sin(angle) * outer).toFixed(5));
        line.setAttribute('y2', (-Math.cos(angle) * outer).toFixed(5));
        line.setAttribute('stroke-width',   width);
        line.setAttribute('stroke-linecap', 'round');
        line.classList.add('tick');
        target.appendChild(line);
      }

      // ── Hour & minute ticks ───────────────────────────────────────
      for (let i = 0; i < 60; i++) {
        const major       = (i % 5 === 0);
        const isMonthTick = i === monthTickIdx;
        const isDateTick  = i === dateTickIdx;
        const a           = i * 6 * Math.PI / 180;

        if (major) {
          appendTick(ticksEl, a, isMonthTick ? monthInner : majorInner, tickOuter, mW);
          if (isDateTick) appendTick(ticksEl, a, dateInner, tickOuter, sW);
        } else if (isDateTick) {
          appendTick(ticksEl, a, dateInner, tickOuter, sW);
        } else {
          appendTick(minTicksEl, a, minorInner, tickOuter, sW);
        }
      }

      // ── Day of week: 7 circles on inner perimeter (r = 0.650) ─────
      // Ordered Mon→Sun, matching hour positions 9→3
      const DAY_POSITIONS = [45, 50, 55, 0, 5, 10, 15];
      const dayCircleRad  = 0.650;
      const dayCircleR    = stem * phi3;

      for (let d = 0; d < 7; d++) {
        const idx     = DAY_POSITIONS[d];
        const a       = idx * 6 * Math.PI / 180;
        const isToday = idx === dayTickIdx;

        const circle = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
        circle.setAttribute('cx', ( Math.sin(a) * dayCircleRad).toFixed(5));
        circle.setAttribute('cy', (-Math.cos(a) * dayCircleRad).toFixed(5));
        circle.setAttribute('r',  dayCircleR.toFixed(5));
        circle.setAttribute('stroke-width', sW);
        if (!isToday) circle.style.fill = 'none';
        circle.classList.add('tick');
        ticksEl.appendChild(circle);
      }
    }

    // ─── Hand builders ─────────────────────────────────────────────
    function mkRect(x, y, w, h, rx = 0) {
      const el = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
      el.setAttribute('x', x); el.setAttribute('y', y);
      el.setAttribute('width', w); el.setAttribute('height', h);
      if (rx) el.setAttribute('rx', rx);
      el.classList.add('hand');
      return el;
    }

    function mkCircle(cx, cy, r) {
      const el = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
      el.setAttribute('cx', cx); el.setAttribute('cy', cy); el.setAttribute('r', r);
      el.classList.add('hand');
      return el;
    }

    const hHandEl = document.getElementById('hHand');
    const mHandEl = document.getElementById('mHand');
    const sHandEl = document.getElementById('sHand');

    function buildHands() {
      hHandEl.innerHTML = '';
      mHandEl.innerHTML = '';
      sHandEl.innerHTML = '';

      hHandEl.appendChild(mkRect(-hW/2, -0.500, hW, 0.570, hW/2));
      mHandEl.appendChild(mkRect(-mW/2, -0.755, mW, 0.845, mW/2));
      sHandEl.appendChild(mkRect(-sW/2, -0.862, sW, 0.952, sW/2));
      sHandEl.appendChild(mkCircle(0, 0.210, 0.040));
    }

    // ─── Build ─────────────────────────────────────────────────────
    function build() {
      updateWidths();
      buildTicks();
      buildHands();
    }

    // ─── Restore persisted settings ────────────────────────────────
    const slider = document.getElementById('stemSlider');

    const savedStem = localStorage.getItem('stem');
    if (savedStem !== null) {
      slider.value = savedStem;
      stem = savedStem / 1000;
    }

    const savedMinTicks = localStorage.getItem('minTicks');
    if (savedMinTicks === 'true') {
      minTicksEl.style.display = '';
      document.getElementById('minToggle').classList.add('active');
    }

    build();

    // ─── Clock mode & animation loop ──────────────────────────────
    // Clock mode (continuous / ticking) is the governing factor; FPS follows.
    // On page load in ticking mode a startup sweep runs at 30 FPS, animating
    // all hands from 12:00 to their correct positions, then drops to 1 FPS.

    const ANIM_SPEED = 240;  // deg/sec during startup sweep (~1.5 s worst-case)

    let targetFps = parseInt(localStorage.getItem('fps') ?? '30', 10);
    let FRAME_MS  = 1000 / 30;  // always start at 30 FPS; may drop after sweep
    // Initialise to now so the first RAF dt is ~5–15 ms, not "time since navigation".
    let lastDraw  = performance.now();

    // Per-hand animated and target angles for startup sweep
    let startupAnim = false;
    let animS = 0, animM = 0, animH = 0;
    let animTargetS = 0, animTargetM = 0, animTargetH = 0;

    function draw(ts) {
      requestAnimationFrame(draw);

      if (ts - lastDraw < FRAME_MS) return;
      // Cap dt so a hidden-then-restored tab can't skip the animation.
      const dt = Math.min((ts - lastDraw) / 1000, 0.1);
      lastDraw = ts;

      if (startupAnim) {
        animS = Math.min(animS + ANIM_SPEED * dt, animTargetS);
        animM = Math.min(animM + ANIM_SPEED * dt, animTargetM);
        animH = Math.min(animH + ANIM_SPEED * dt, animTargetH);

        hHandEl.setAttribute('transform', `rotate(${animH.toFixed(3)})`);
        mHandEl.setAttribute('transform', `rotate(${animM.toFixed(3)})`);
        sHandEl.setAttribute('transform', `rotate(${animS.toFixed(3)})`);

        if (animS >= animTargetS && animM >= animTargetM && animH >= animTargetH) {
          startupAnim = false;
          FRAME_MS    = 1000 / targetFps;  // drop to 1 FPS
        }
        return;
      }

      const now = new Date();
      const ms  = now.getMilliseconds();
      const s   = targetFps === 30
                    ? now.getSeconds() + ms / 1000
                    : now.getSeconds();
      const m   = now.getMinutes()      + s  / 60;
      const h   = (now.getHours() % 12) + m  / 60;

      hHandEl.setAttribute('transform', `rotate(${(h * 30).toFixed(3)})`);
      mHandEl.setAttribute('transform', `rotate(${(m *  6).toFixed(3)})`);
      sHandEl.setAttribute('transform', `rotate(${(s *  6).toFixed(3)})`);
    }

    requestAnimationFrame(draw);

    // ─── Minute tick toggle ────────────────────────────────────────
    document.getElementById('minToggle').addEventListener('click', function () {
      const visible = minTicksEl.style.display !== 'none';
      minTicksEl.style.display = visible ? 'none' : '';
      this.classList.toggle('active', !visible);
      localStorage.setItem('minTicks', !visible);
    });

    // ─── FPS toggle ────────────────────────────────────────────────
    const fpsToggleEl = document.getElementById('fpsToggle');

    // Continuous: full circle. Ticking: circle with gap at 12 o'clock.
    // Gap endpoints are at ±0.25 on x, at y = -sqrt(0.65²-0.25²) ≈ -0.601.
    const ICON_CONTINUOUS = `<svg width="20" height="20" viewBox="-1 -1 2 2" fill="none">
      <circle cx="0" cy="0" r="0.65" stroke="currentColor" stroke-width="0.14"/>
    </svg>`;
    const ICON_TICKING = `<svg width="20" height="20" viewBox="-1 -1 2 2" fill="none">
      <path d="M -0.25 -0.601 A 0.65 0.65 0 1 1 0.25 -0.601" stroke="currentColor" stroke-width="0.14" stroke-linecap="round"/>
    </svg>`;

    function applyFps(fps) {
      startupAnim = false;       // cancel any in-progress startup sweep
      targetFps   = fps;
      FRAME_MS    = 1000 / fps;
      fpsToggleEl.innerHTML = fps === 30 ? ICON_CONTINUOUS : ICON_TICKING;
      fpsToggleEl.classList.toggle('ticking', fps === 1);
      localStorage.setItem('fps', fps);
    }

    applyFps(targetFps);

    // Arm startup sweep after applyFps so it isn't immediately cancelled.
    // Also restore 30 FPS for the sweep duration — applyFps set it to 1000 ms.
    if (targetFps === 1) {
      startupAnim = true;
      FRAME_MS = 1000 / 30;
      const t  = new Date();
      const ms = t.getMilliseconds();
      const s0 = t.getSeconds() + ms / 1000;
      const m0 = t.getMinutes() + s0 / 60;
      const h0 = (t.getHours() % 12) + m0 / 60;
      animTargetS = s0 * 6;
      animTargetM = m0 * 6;
      animTargetH = h0 * 30;
    }

    fpsToggleEl.addEventListener('click', function () {
      applyFps(targetFps === 30 ? 1 : 30);
    });

    // ─── Stem slider ───────────────────────────────────────────────
    document.getElementById('stemSlider').addEventListener('input', function () {
      stem = this.value / 1000;
      localStorage.setItem('stem', this.value);
      build();
    });
  </script>

</body>

</html>
