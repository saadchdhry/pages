<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>&#8212;</title>
  <link rel="icon" type="image/png" href="favicon.png">
  <style>
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      color-scheme: light dark;
    }

    body {
      height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display",
                   "Helvetica Neue", "Segoe UI", sans-serif;
      user-select: none;
      -webkit-font-smoothing: antialiased;
      transition: background 0.3s, color 0.3s;
    }

    /* ── Dark ── */
    @media (prefers-color-scheme: dark) {
      body   { background: #0c0c0c; }
      .time  { color: #f0f0f0; }
      .secs  { color: #333; }
      .date  { color: #3a3a3a; }
    }

    /* ── Light ── */
    @media (prefers-color-scheme: light) {
      body   { background: #f5f5f3; }
      .time  { color: #111111; }
      .secs  { color: #ccc; }
      .date  { color: #c0c0c0; }
    }

    .clock-wrap {
      display: flex;
      align-items: baseline;
      gap: 0.15em;
    }

    .time {
      font-size: clamp(72px, 14vw, 140px);
      font-weight: 100;
      letter-spacing: -0.03em;
      line-height: 1;
      font-variant-numeric: tabular-nums;
    }

    .secs {
      font-size: clamp(32px, 6vw, 60px);
      font-weight: 100;
      letter-spacing: -0.03em;
      font-variant-numeric: tabular-nums;
      line-height: 1;
    }

    .date {
      margin-top: clamp(10px, 1.5vw, 20px);
      font-size: clamp(11px, 1.4vw, 15px);
      font-weight: 400;
      letter-spacing: 0.25em;
      text-transform: uppercase;
    }

    /* ── Tab ── */
    .tab {
      position: fixed;
      bottom: 24px;
      right: 24px;
      width: 36px;
      height: 36px;
      opacity: 0.18;
      transition: opacity 0.2s ease;
      text-decoration: none;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .tab:hover { opacity: 0.55; }

    @media (prefers-color-scheme: dark)  { .tab { color: #f0f0f0; } }
    @media (prefers-color-scheme: light) { .tab { color: #111111; } }
  </style>
</head>
<body>

  <div class="clock-wrap">
    <span class="time" id="clock">00:00</span>
    <span class="secs" id="secs">00</span>
  </div>
  <div class="date" id="date">Monday, Apr 20</div>

  <a href="analog.html" class="tab" aria-label="Analog clock">
    <svg width="36" height="36" viewBox="0 0 36 36" fill="none">
      <circle cx="18" cy="18" r="11" stroke="currentColor" stroke-width="1.5"/>
    </svg>
  </a>

  <script>
    const DAYS   = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
    const MONTHS = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

    function tick() {
      const now = new Date();
      const h   = String(now.getHours()).padStart(2, '0');
      const m   = String(now.getMinutes()).padStart(2, '0');
      const s   = String(now.getSeconds()).padStart(2, '0');

      document.getElementById('clock').textContent = `${h}:${m}`;
      document.getElementById('secs').textContent  = s;
      document.getElementById('date').textContent  =
        `${DAYS[now.getDay()]}, ${MONTHS[now.getMonth()]} ${now.getDate()}`;
    }

    tick();
    setInterval(tick, 1000);
  </script>

</body>
</html>
