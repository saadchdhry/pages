<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>&#8212;</title>
  <link rel="icon" type="image/png" href="favicon.png">
  <style>
    *,
    *::before,
    *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      color-scheme: light dark;
    }

    body {
      height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      user-select: none;
    }

    @media (prefers-color-scheme: dark) {
      body {
        background: #0c0c0c;
      }

      .bg {
        fill: #0c0c0c;
      }
    }

    @media (prefers-color-scheme: light) {
      body {
        background: #f5f5f3;
      }

      .bg {
        fill: #f5f5f3;
      }
    }

    #clock {
      width: min(70vw, 70vh);
      height: min(70vw, 70vh);
      display: block;
      border-radius: 50%;
    }

    /* All clock elements use difference blending against white.
       On dark bg:  white → appears white; white-on-white → inverts to black.
       On light bg: white → appears near-black; overlaps re-invert.       */
    .tick,
    .hand,
    .pip {
      mix-blend-mode: difference;
      fill: white;
      stroke: white;
    }

    /* Hands are filled rects — stroke would default to 1 SVG user unit (enormous) */
    .hand {
      stroke: none;
    }

    /* ── Tab ── */
    .tab {
      position: fixed;
      bottom: 24px;
      right: 24px;
      width: 36px;
      height: 36px;
      opacity: 0.18;
      transition: opacity 0.2s ease;
      text-decoration: none;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .tab:hover {
      opacity: 0.55;
    }

    /* ── Minute tick toggle ── */
    #minToggle {
      position: fixed;
      bottom: 70px;
      right: 24px;
      width: 36px;
      height: 36px;
      opacity: 0.18;
      transition: opacity 0.2s ease;
      background: none;
      border: none;
      padding: 0;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    #minToggle:hover  { opacity: 0.55; }
    #minToggle.active { opacity: 0.40; }

    /* ── Stem slider ── */
    #stemSlider {
      position: fixed;
      bottom: 32px;
      left: 24px;
      width: 80px;
      opacity: 0.18;
      transition: opacity 0.2s ease;
      cursor: pointer;
    }
    #stemSlider:hover { opacity: 0.55; }
    @media (prefers-color-scheme: dark)  { #stemSlider { accent-color: #f0f0f0; } }
    @media (prefers-color-scheme: light) { #stemSlider { accent-color: #111111; } }

    @media (prefers-color-scheme: dark) {
      .tab {
        color: #f0f0f0;
      }
    }

    @media (prefers-color-scheme: light) {
      .tab {
        color: #111111;
      }
    }
  </style>
</head>

<body>

  <svg id="clock" viewBox="-1 -1 2 2">

    <!-- Solid background so blend modes have a known base -->
    <rect x="-1" y="-1" width="2" height="2" class="bg" />

    <!-- 12 hour tick marks, generated below -->
    <g id="ticks"></g>

    <!-- 48 minute tick marks (toggleable), hidden by default -->
    <g id="minTicks" style="display:none"></g>

    <!-- Hands — rendered in z-order: hour → minute → second
         Each hand blends against the composited backdrop below it,
         so overlapping hands invert each other's rendered colour.   -->
    <g id="hHand"></g>
    <g id="mHand"></g>
    <g id="sHand"></g>

    <!-- Centre pip, rendered last so it always reads clearly -->
    <circle cx="0" cy="0" r="0.036" class="pip" />

  </svg>

  <!-- Stem slider: controls universal base stroke width -->
  <input type="range" id="stemSlider" min="2" max="20" value="5" step="1" aria-label="Stroke weight">

  <!-- Toggle: show/hide minute tick markers -->
  <button id="minToggle" aria-label="Toggle minute markers">
    <svg width="20" height="20" viewBox="-1 -1 2 2" fill="none">
      <line x1="0"     y1="-0.62" x2="0"     y2="-0.90" stroke="currentColor" stroke-width="0.14" stroke-linecap="round"/>
      <line x1="0.62"  y1="0"     x2="0.90"  y2="0"     stroke="currentColor" stroke-width="0.14" stroke-linecap="round"/>
      <line x1="0"     y1="0.62"  x2="0"     y2="0.90"  stroke="currentColor" stroke-width="0.14" stroke-linecap="round"/>
      <line x1="-0.62" y1="0"     x2="-0.90" y2="0"     stroke="currentColor" stroke-width="0.14" stroke-linecap="round"/>
    </svg>
  </button>

  <!-- Tab: dot → back to digital -->
  <a href="index.html" class="tab" aria-label="Digital clock">
    <svg width="36" height="36" viewBox="0 0 36 36">
      <circle cx="18" cy="18" r="4" fill="currentColor" />
    </svg>
  </a>

  <script>
    // ─── Design constants ──────────────────────────────────────────
    const PHI  = (1 + Math.sqrt(5)) / 2;   // φ ≈ 1.618 (golden ratio)
    let   stem = 0.005;                     // universal base dimension → driven by slider
    let   sW, mW, hW;

    function updateWidths() {
      sW = stem;
      mW = stem * PHI;        // stem × φ
      hW = stem * PHI * PHI;  // stem × φ²
    }

    // ─── Tick marks ────────────────────────────────────────────────
    const ticksEl    = document.getElementById('ticks');
    const minTicksEl = document.getElementById('minTicks');

    function buildTicks() {
      ticksEl.innerHTML    = '';
      minTicksEl.innerHTML = '';

      for (let i = 0; i < 60; i++) {
        const major  = (i % 5 === 0);
        const a      = i * 6 * Math.PI / 180;
        const r0     = major ? 0.860 : 0.868;
        const sw     = major ? mW : sW;         // hour markers → mW; minute markers → sW
        const target = major ? ticksEl : minTicksEl;

        const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
        line.setAttribute('x1', ( Math.sin(a) * r0).toFixed(5));
        line.setAttribute('y1', (-Math.cos(a) * r0).toFixed(5));
        line.setAttribute('x2', ( Math.sin(a) * 0.940).toFixed(5));
        line.setAttribute('y2', (-Math.cos(a) * 0.940).toFixed(5));
        line.setAttribute('stroke-width',   sw);
        line.setAttribute('stroke-linecap', 'round');
        line.classList.add('tick');
        target.appendChild(line);
      }
    }

    // ─── Hand builders ─────────────────────────────────────────────
    function mkRect(x, y, w, h, rx = 0) {
      const el = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
      el.setAttribute('x', x); el.setAttribute('y', y);
      el.setAttribute('width', w); el.setAttribute('height', h);
      if (rx) el.setAttribute('rx', rx);
      el.classList.add('hand');
      return el;
    }

    function mkCircle(cx, cy, r) {
      const el = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
      el.setAttribute('cx', cx); el.setAttribute('cy', cy); el.setAttribute('r', r);
      el.classList.add('hand');
      return el;
    }

    const hHandEl = document.getElementById('hHand');
    const mHandEl = document.getElementById('mHand');
    const sHandEl = document.getElementById('sHand');

    function buildHands() {
      hHandEl.innerHTML = '';
      mHandEl.innerHTML = '';
      sHandEl.innerHTML = '';

      hHandEl.appendChild(mkRect(-hW/2, -0.500, hW, 0.570, hW/2));  // tip -0.500, tail +0.070
      mHandEl.appendChild(mkRect(-mW/2, -0.755, mW, 0.845, mW/2));  // tip -0.755, tail +0.090
      sHandEl.appendChild(mkRect(-sW/2, -0.862, sW, 0.952, sW/2));  // tip -0.862, tail +0.090
      sHandEl.appendChild(mkCircle(0, 0.210, 0.040));                // lollipop circle
    }

    // ─── Build (called on load and on slider change) ───────────────
    function build() {
      updateWidths();
      buildTicks();
      buildHands();
    }

    build();

    // ─── Smooth animation via requestAnimationFrame ─────────────────
    function draw() {
      const now = new Date();
      const ms  = now.getMilliseconds();
      const s   = now.getSeconds()      + ms / 1000;
      const m   = now.getMinutes()      + s  / 60;
      const h   = (now.getHours() % 12) + m  / 60;

      hHandEl.setAttribute('transform', `rotate(${(h * 30).toFixed(4)})`);
      mHandEl.setAttribute('transform', `rotate(${(m *  6).toFixed(4)})`);
      sHandEl.setAttribute('transform', `rotate(${(s *  6).toFixed(4)})`);

      requestAnimationFrame(draw);
    }

    draw();

    // ─── Minute tick toggle ────────────────────────────────────────
    document.getElementById('minToggle').addEventListener('click', function () {
      const visible = minTicksEl.style.display !== 'none';
      minTicksEl.style.display = visible ? 'none' : '';
      this.classList.toggle('active', !visible);
    });

    // ─── Stem slider ──────────────────────────────────────────────
    document.getElementById('stemSlider').addEventListener('input', function () {
      stem = this.value / 1000;
      build();
    });
  </script>

</body>

</html>
